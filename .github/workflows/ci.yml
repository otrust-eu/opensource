name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Restrict default permissions for security
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint --if-present

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Validate OpenAPI contract
        run: npm run validate:openapi

      - name: Run unit tests with coverage
        run: npm run test:unit -- --forceExit --coverage
        timeout-minutes: 3

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run integration tests
        run: npm run test:integration -- --forceExit --detectOpenHandles
        timeout-minutes: 8
        env:
          MONGODB_URL: mongodb://localhost:27017
          MONGODB_DB: otrust_test
          NODE_ENV: test
          TEST_MODE: 'true'

  circuits:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install circuit dependencies
        run: npm ci --prefix circuits

      - name: Install Circom 2.2.3
        run: |
          curl -fsSL https://github.com/iden3/circom/releases/download/v2.2.3/circom-linux-amd64 -o /tmp/circom
          echo "85342c7ff332d948df7c0c50ecf201e6129349aef550ce873f3c811b79fe53a3  /tmp/circom" | sha256sum -c -
          chmod +x /tmp/circom
          sudo mv /tmp/circom /usr/local/bin/circom

      - name: Build circuits and proving keys
        run: npm run build --prefix circuits

      - name: Generate and verify proofs
        run: npm test --prefix circuits

      - name: Verify published browser artifacts
        run: npm run verify:published --prefix circuits

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Audit root dependencies
        run: npm audit --audit-level=high

      - name: Audit SDK dependencies
        run: |
          if node -e "const pkg = require('./package.json'); process.exit(Array.isArray(pkg.workspaces) ? 0 : 1)"; then
            (cd sdk-js && npm audit --audit-level=high)
            (cd sdk-react && npm audit --audit-level=high)
          else
            npm audit --prefix sdk-js --audit-level=high --package-lock-only
            npm audit --prefix sdk-react --audit-level=high --package-lock-only
          fi

      - name: Audit addon dependencies
        run: |
          for dir in addons/email-worker addons/sign-email-worker addons/whatsapp-bot addons/telegram-bot; do
            if [ -f "$dir/package-lock.json" ]; then
              npm audit --prefix "$dir" --audit-level=low --package-lock-only
            fi
          done
