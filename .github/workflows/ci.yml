name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Restrict default permissions for security
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint --if-present

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Validate OpenAPI contract
        run: npm run validate:openapi

      - name: Run unit tests with coverage
        run: npm run test:unit -- --forceExit --coverage
        timeout-minutes: 3

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run integration tests
        run: npm run test:integration -- --forceExit --detectOpenHandles
        timeout-minutes: 8
        env:
          MONGODB_URL: mongodb://localhost:27017
          MONGODB_DB: otrust_test
          NODE_ENV: test
          TEST_MODE: 'true'

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Audit root dependencies
        run: npm audit --audit-level=high

      - name: Audit SDK dependencies
        run: |
          if node -e "const pkg = require('./package.json'); process.exit(Array.isArray(pkg.workspaces) ? 0 : 1)"; then
            (cd sdk-js && npm audit --audit-level=high)
            (cd sdk-react && npm audit --audit-level=high)
          else
            npm audit --prefix sdk-js --audit-level=high --package-lock-only
            npm audit --prefix sdk-react --audit-level=high --package-lock-only
          fi
