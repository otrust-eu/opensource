name: Lighthouse

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start server
        run: |
          node src/server.js &
          echo $! > server.pid
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/health && break
            sleep 2
          done
        env:
          PORT: 8080
          MONGODB_URL: mongodb://localhost:27017
          MONGODB_DB: otrust_lhci
          NODE_ENV: test

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:8080/
            http://localhost:8080/timestamp
            http://localhost:8080/proof
            http://localhost:8080/transparency
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Stop server
        if: always()
        run: kill "$(cat server.pid)" 2>/dev/null || true