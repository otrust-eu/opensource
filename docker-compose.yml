# OTRUST Local Development Environment
# Usage: docker-compose up

version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
      - PORT=8080
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB=otrust
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      # Mount source for hot reload (optional)
      - ./src:/app/src:ro
      - ./web:/app/web:ro
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Optional: MongoDB web UI
  mongo-express:
    image: mongo-express:latest
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongodb:27017
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      mongodb:
        condition: service_healthy
    profiles:
      - debug

volumes:
  mongodb_data:
