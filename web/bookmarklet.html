    <h1>Verify this page</h1>
    <p>Drag the button below to your bookmarks bar. On any public webpage, click it to hash the page and open OTRUST verify.</p>
    <p>
      <a class="btn btn-primary" href="javascript:(function(){var h=location.hostname.replace(/^www\./,'');fetch('https://www.otrust.eu/api/usage/event',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({event:'hash_computed',count:1})}).catch(function(){});var s=document.documentElement.outerHTML;crypto.subtle.digest('SHA-256',new TextEncoder().encode(s)).then(function(b){var a=Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0')}).join('');fetch('https://www.otrust.eu/api/domain-trust?host='+encodeURIComponent(h)).then(function(r){return r.json();}).then(function(d){var note=d.otrust_embed?' · OTRUST domain':' · external domain';window.open('https://www.otrust.eu/#verify='+a,'_blank');}).catch(function(){window.open('https://www.otrust.eu/#verify='+a,'_blank');});});})();">
        OTRUST Verify Page v2
      </a>
    </p>
    <p style="color:var(--text-dim);font-size:0.85rem;">v2 checks domain trust metadata before opening verify. Works on https:// pages with Web Crypto.</p>
