<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTRUST Embed Badge</title>
  <link rel="stylesheet" href="/otrust-redesign.css?v=20260704ux">
</head>
<body data-otrust-page="docs">
  <main style="max-width:720px;margin:2rem auto;padding:0 1rem;">
    <h1>Embeddable trust badge</h1>
    <p>Add live OTRUST stats to your site:</p>
    <pre style="background:#f5f5f4;padding:1rem;border-radius:8px;overflow:auto;"><code>&lt;script src="https://www.otrust.eu/js/otrust-embed.js" data-otrust-badge&gt;&lt;/script&gt;</code></pre>
    <h2>Preview (light)</h2>
    <div id="preview"></div>
    <script src="/js/otrust-embed.js" data-otrust-badge></script>

    <h2 style="margin-top:2rem;">Preview (dark, SV)</h2>
    <div id="preview-dark"></div>
    <script src="/js/otrust-embed.js" data-otrust-badge data-otrust-theme="dark" data-otrust-lang="sv"></script>
    <p style="margin-top:2rem;"><a href="/stats/badges.json">JSON badges API</a> · <a href="/transparency">Transparency log</a></p>
  </main>
</body>
</html>
