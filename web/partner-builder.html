<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTRUST Partner Theme Builder</title>
  <link rel="stylesheet" href="/otrust-redesign.css?v=20260731">
</head>
<body data-otrust-page="docs">
  <main style="max-width:800px;margin:2rem auto;padding:0 1rem;">
    <h1>Partner theme builder</h1>
    <p style="color:var(--text-dim);">Preview hosted Auth branding before wiring your integration.</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-top:1rem;">
      <form id="theme-form">
        <label>Partner name <input name="partner_name" value="Acme Corp" style="width:100%;margin-top:0.25rem;"></label>
        <label style="display:block;margin-top:0.75rem;">Headline <input name="headline" value="Sign in to Acme" style="width:100%;margin-top:0.25rem;"></label>
        <label style="display:block;margin-top:0.75rem;">Subhead <input name="subhead" value="Secure verification via OTRUST" style="width:100%;margin-top:0.25rem;"></label>
        <label style="display:block;margin-top:0.75rem;">Accent <input name="accent" type="color" value="#2d5a3d" style="margin-top:0.25rem;"></label>
        <button type="submit" class="btn btn-primary" style="margin-top:1rem;">Preview</button>
      </form>
      <div id="preview" style="border:1px solid var(--border);border-radius:12px;padding:1.5rem;background:var(--bg-card);"></div>
    </div>
    <p style="margin-top:1.5rem;font-size:0.85rem;"><a href="/partners/hemsted">Live Hemsted example</a> · <a href="/docs#proofauth">Auth docs</a></p>
  </main>
  <script>
    async function renderPreview(data) {
      const p = data.preview;
      document.getElementById('preview').innerHTML = `
        <div style="border-left:4px solid ${p.accent};padding-left:1rem;">
          <div style="font-weight:700;">${p.logo_text || p.partner_name}</div>
          <p style="font-size:0.75rem;color:var(--text-dim);">${p.disclosure}</p>
          <h2 style="margin:0.75rem 0 0.25rem;">${p.headline}</h2>
          <p style="color:var(--text-dim);font-size:0.9rem;">${p.subhead}</p>
          <button type="button" style="margin-top:1rem;padding:0.5rem 1rem;background:${p.accent};color:#fff;border:none;border-radius:6px;">Continue with OTRUST ID</button>
        </div>`;
    }
    document.getElementById('theme-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const body = Object.fromEntries(fd.entries());
      const res = await fetch('/api/partner-theme/preview', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
      renderPreview(await res.json());
    });
    fetch('/api/partner-theme/preview', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ partner_name:'Acme Corp' }) }).then(r=>r.json()).then(renderPreview);
  </script>
</body>
</html>
