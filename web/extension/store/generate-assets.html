<!DOCTYPE html>
<html>
<head>
  <title>OTRUST Extension Assets Generator</title>
  <style>
    body { font-family: system-ui; padding: 2rem; background: #f5f5f4; }
    h1 { color: #1a1a1a; }
    .asset { margin: 2rem 0; }
    canvas { border: 1px solid #ddd; background: white; }
    button { padding: 0.5rem 1rem; margin: 0.5rem; cursor: pointer; }
  </style>
</head>
<body>
  <h1>OTRUST Chrome Web Store Assets</h1>
  <p>Click buttons to download PNG files.</p>
  
  <div class="asset">
    <h3>Icon 128x128</h3>
    <canvas id="icon128" width="128" height="128"></canvas>
    <br><button onclick="download('icon128', 'icon-128.png')">Download icon-128.png</button>
  </div>
  
  <div class="asset">
    <h3>Promo Tile 440x280</h3>
    <canvas id="promo440" width="440" height="280"></canvas>
    <br><button onclick="download('promo440', 'promo-440x280.png')">Download promo-440x280.png</button>
  </div>
  
  <div class="asset">
    <h3>Marquee 1400x560</h3>
    <canvas id="marquee" width="1400" height="560"></canvas>
    <br><button onclick="download('marquee', 'marquee-1400x560.png')">Download marquee-1400x560.png</button>
  </div>

  <script>
    // Draw Icon 128x128
    const ctx128 = document.getElementById('icon128').getContext('2d');
    const grad128 = ctx128.createLinearGradient(0, 0, 128, 128);
    grad128.addColorStop(0, '#2d5a3d');
    grad128.addColorStop(1, '#1e4029');
    ctx128.fillStyle = grad128;
    ctx128.beginPath();
    ctx128.roundRect(0, 0, 128, 128, 24);
    ctx128.fill();
    
    ctx128.strokeStyle = 'white';
    ctx128.lineWidth = 4;
    ctx128.lineCap = 'round';
    ctx128.beginPath();
    ctx128.arc(64, 64, 32, 0, Math.PI * 2);
    ctx128.stroke();
    ctx128.beginPath();
    ctx128.moveTo(64, 44);
    ctx128.lineTo(64, 64);
    ctx128.lineTo(78, 71);
    ctx128.stroke();

    // Draw Promo 440x280
    const ctx440 = document.getElementById('promo440').getContext('2d');
    const grad440 = ctx440.createLinearGradient(0, 0, 440, 280);
    grad440.addColorStop(0, '#fafaf9');
    grad440.addColorStop(1, '#f5f5f4');
    ctx440.fillStyle = grad440;
    ctx440.fillRect(0, 0, 440, 280);
    
    // Icon in center
    const gradIcon = ctx440.createLinearGradient(170, 50, 270, 150);
    gradIcon.addColorStop(0, '#2d5a3d');
    gradIcon.addColorStop(1, '#1e4029');
    ctx440.fillStyle = gradIcon;
    ctx440.beginPath();
    ctx440.roundRect(170, 50, 100, 100, 20);
    ctx440.fill();
    
    ctx440.strokeStyle = 'white';
    ctx440.lineWidth = 4;
    ctx440.lineCap = 'round';
    ctx440.beginPath();
    ctx440.arc(220, 100, 28, 0, Math.PI * 2);
    ctx440.stroke();
    ctx440.beginPath();
    ctx440.moveTo(220, 84);
    ctx440.lineTo(220, 100);
    ctx440.lineTo(232, 106);
    ctx440.stroke();
    
    ctx440.fillStyle = '#1a1a1a';
    ctx440.font = '600 28px system-ui';
    ctx440.textAlign = 'center';
    ctx440.fillText('OTRUST', 220, 190);
    
    ctx440.fillStyle = '#737373';
    ctx440.font = '14px system-ui';
    ctx440.fillText('Blockchain Timestamp Service', 220, 218);
    
    ctx440.fillStyle = '#2d5a3d';
    ctx440.font = '12px system-ui';
    ctx440.fillText('Timestamp any webpage with one click', 220, 250);

    // Draw Marquee 1400x560
    const ctxM = document.getElementById('marquee').getContext('2d');
    const gradM = ctxM.createLinearGradient(0, 0, 1400, 560);
    gradM.addColorStop(0, '#fafaf9');
    gradM.addColorStop(1, '#f0f0ef');
    ctxM.fillStyle = gradM;
    ctxM.fillRect(0, 0, 1400, 560);
    
    // Large icon
    const gradIconM = ctxM.createLinearGradient(550, 100, 850, 400);
    gradIconM.addColorStop(0, '#2d5a3d');
    gradIconM.addColorStop(1, '#1e4029');
    ctxM.fillStyle = gradIconM;
    ctxM.beginPath();
    ctxM.roundRect(600, 120, 200, 200, 40);
    ctxM.fill();
    
    ctxM.strokeStyle = 'white';
    ctxM.lineWidth = 8;
    ctxM.lineCap = 'round';
    ctxM.beginPath();
    ctxM.arc(700, 220, 60, 0, Math.PI * 2);
    ctxM.stroke();
    ctxM.beginPath();
    ctxM.moveTo(700, 180);
    ctxM.lineTo(700, 220);
    ctxM.lineTo(728, 234);
    ctxM.stroke();
    
    ctxM.fillStyle = '#1a1a1a';
    ctxM.font = '600 56px system-ui';
    ctxM.textAlign = 'center';
    ctxM.fillText('OTRUST', 700, 390);
    
    ctxM.fillStyle = '#737373';
    ctxM.font = '24px system-ui';
    ctxM.fillText('Blockchain Timestamp Service', 700, 430);
    
    ctxM.fillStyle = '#2d5a3d';
    ctxM.font = '500 20px system-ui';
    ctxM.fillText('Timestamp any webpage with one click · Anchored to blockchain', 700, 480);

    function download(canvasId, filename) {
      const canvas = document.getElementById(canvasId);
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
